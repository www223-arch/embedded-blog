id: motor-control
title: STM32 PID Motor Controller
summary: High-performance closed-loop motor control system based on STM32 HAL library,
  supporting online parameter tuning and real-time monitoring.
stack:
- STM32 HAL
- C++
- PID
- CAN Bus
highlights:
- Speed/position dual-loop PID control
- UART real-time parameter adjustment
- Over-current/over-temperature protection
- CAN bus multi-machine communication
- Graphical debugging interface
